apiVersion: v1
kind: Service
metadata:
  name: real-world-app-dev-service
  namespace: dev
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  selector:
    app: real-world-app-dev
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 80
  type: LoadBalancer
