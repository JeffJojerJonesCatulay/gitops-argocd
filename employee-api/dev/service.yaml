apiVersion: v1
kind: Service
metadata:
  name: employee-api-dev-service
  namespace: dev
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  selector:
    app: employee-api-dev
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 9010
  type: LoadBalancer
